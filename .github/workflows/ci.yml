name: CI

on:
  push:
  pull_request:

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ensure env files are not committed
        run: |
          python - <<'PY'
          import subprocess
          import sys

          allowed = {
              ".env.example",
              ".env.docker.example",
              "frontend/.env.example",
          }
          offenders = [
              path
              for path in subprocess.check_output(["git", "ls-files"], text=True).splitlines()
              if path.rsplit("/", 1)[-1].startswith(".env") and path not in allowed
          ]
          if offenders:
              print("Committed env files are not allowed:", offenders)
              sys.exit(1)
          PY
      - name: Check obvious secrets
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys
          from pathlib import Path

          skip = {
              ".github/workflows/ci.yml",
              "frontend/package-lock.json",
          }
          patterns = [
              re.compile("AKIA" + r"[0-9A-Z]{16}"),
              re.compile("BEGIN RSA PRIVATE KEY"),
              re.compile("BEGIN OPENSSH PRIVATE KEY"),
              re.compile("password" + r"\s*=\s*['\"][^'\"]{8,}", re.IGNORECASE),
          ]
          hits = []
          for path in subprocess.check_output(["git", "ls-files"], text=True).splitlines():
              if path in skip:
                  continue
              text = Path(path).read_text(encoding="utf-8", errors="ignore")
              for line_no, line in enumerate(text.splitlines(), start=1):
                  if any(pattern.search(line) for pattern in patterns):
                      hits.append(f"{path}:{line_no}")

          if hits:
              print("Potential secrets found:")
              print("\n".join(hits))
              sys.exit(1)
          PY
      - name: Check tracked large files
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys
          limit = 25 * 1024 * 1024
          offenders = []
          for path in subprocess.check_output(["git", "ls-files"], text=True).splitlines():
              if os.path.exists(path) and os.path.getsize(path) > limit:
                  offenders.append((path, os.path.getsize(path)))
          if offenders:
              print(offenders)
              sys.exit(1)
          PY
      - name: Check dependency files
        run: |
          test -f pyproject.toml
          test -f configs/environments/requirements-docker-cpu.txt
          test -f frontend/package-lock.json
      - name: Check Python syntax
        run: python -m compileall backend scripts

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r configs/environments/requirements-docker-cpu.txt
          python -m pip install pytest ruff mypy types-PyYAML httpx
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy
      - name: Pytest
        run: python -m pytest
      - name: Alembic migration smoke
        env:
          FVQL_DATABASE_URL: sqlite:///./ci-migration.db
        run: alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
